<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/recuperarsenha.css">
</head>

<body>

    <div class="quadrado">
        <div class="image">
            <img src="img/logosiva.png" alt="logo do sistema">
        </div>

        <div class="emailsenha">
            <div class="email">
                <div class="inputGroup1">
                    <input type="text" id="matricula" name="username" required>
                    <label for="matricula">Matrícula</label>
                </div>
            </div>

            <div class="senha">
                <div class="inputGroup2">
                    <input type="password" id="senha" name="password" required autocomplete="current-password">
                    <label for="senha">Senha</label>
                    <div id="toggleSenha" onclick="togglePassword()" class="eye-wrapper">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="#2F4D98" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <line id="eyeLine" x1="1" y1="1" x2="23" y2="23" style="display:none; stroke: #2F4D98;">
                            </line>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="esenha">
                <p style="color: black" >Esqueceu a senha? </p>
                <p style="cursor: pointer;" onclick="window.abrirModalRecuperacao()">Clique aqui</p>
            </div>
        </div>

        <div class="btnentrar">
            <button id="btn1" onclick="btnindex()">
                Entrar
            </button>
        </div>
    </div>

    <div id="modalRecuperarSenha" class="sobreposicao">
        <div class="popup-card">
            <h2 class="popup-titulo">Recuperar Senha</h2>
            <div class="popup-conteudo">
                <p style="margin-bottom: 20px;">
                    Informe seu e-mail para recuperação da senha.
                </p>
                <div class="inputGroup1">
                    <input type="email" id="email-recuperacao" required>
                    <label for="email-recuperacao">E-mail</label>
                </div>
            </div>
            <div class="btn-container">
                <button type="button" class="btn-voltar" onclick="window.fecharModalRecuperacao()">
                    Cancelar
                </button>
                <button type="button" class="btn-aceitar" onclick="window.enviarRecuperacaoSenha()">
                    Enviar
                </button>
            </div>
        </div>
    </div>

    <div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
    <div id="toast-aviso1" class="toast-hidden1">Preencha todos os campos!</div>

    <script src="js/basic.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
