<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Veículos</title>
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/tecnicos.css">
</head>

<body class="pagina-tecnicos">

<div id="topbar-container"></div>

<main class="tecnicos-container">
    <section class="painel-tecnicos">
        <div class="painel-tecnicos-topo">
            <div>
                <h1>Visão geral de veículos</h1>
                <p>Consulte a frota completa, filtre por modelo, marca ou status.</p>
            </div>
            <div class="tecnicos-actions">
                <button type="button" class="btn-acao-filtrar" onclick="aplicarFiltroVeiculos()">Buscar</button>
                <button type="button" class="btn-limpar-filtro" onclick="limparFiltroVeiculos()">Limpar</button>
            </div>
        </div>

        <!-- Abas com estilos limpos e utilizando as classes do CSS -->
        <div class="tabs">
            <button id="btnAbaVeiculos" class="btn-aba aba-ativa" onclick="alternarAbaVeiculos('veiculos')">Frota de Veículos</button>
            <button id="btnAbaTipos" class="btn-aba aba-inativa" onclick="alternarAbaVeiculos('tipos')">Tipos de Veículos</button>
        </div>

        <div id="tabVeiculos" style="display: block;">
            <section class="tecnicos-filtro-panel">
                <div class="filtro-busca">
                    <input id="filtroBuscaVeiculo" type="text" class="filtro-busca-input"
                           placeholder="Digite modelo, marca, prefixo ou placa">
                </div>
            </section>

            <div class="tecnicos-table-wrapper">
                <table class="tecnicos-table">
                    <thead>
                    <tr>
                        <th>Modelo</th>
                        <th>Marca</th>
                        <th>Prefixo</th>
                        <th>Placa</th>
                        <th>Tipo</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody id="veiculosTabelaCorpo"></tbody>
                </table>
            </div>
        </div>

        <div id="tabTipos" style="display: none;">
            <div class="tecnicos-table-wrapper">
                <table class="tecnicos-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Ano</th>
                        <th>Categoria</th>
                    </tr>
                    </thead>
                    <tbody id="tiposVeiculosTabelaCorpo"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<div id="sidebar-container"></div>

<div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
<div id="toast-aviso1" class="toast-hidden1">Operação realizada com sucesso!</div>

<script src="js/basic.js"></script>
<script src="js/componentes.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/vehicle.js"></script>
<script>
    injetarLayout("Veículos");
</script>
</body>

</html>
