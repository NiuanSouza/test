<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/configuracoes.css">
</head>

<body class="pagina-configuracoes">
    <div id="topbar-container"></div>

    <main class="config-container">
        <section class="config-header">
            <h1>Configurações da conta</h1>
            <p>Altere e atualize seus dados de acesso, contato e categoria de CNH.</p>
        </section>

        <section class="config-card">
            <aside class="perfil-sidebar">
                <div class="perfil-imagem">
                    <img id="previewFoto" alt="Foto de perfil" />
                    <span id="avatarPlaceholder">
                        <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="#617292" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>
                </div>
                <div class="perfil-info">
                    <strong id="perfilNome">Usuário</strong>
                    <span id="perfilRole" class="perfil-role">Carregando...</span>
                </div>
            </aside>

            <form class="perfil-form" onsubmit="event.preventDefault(); salvarConfiguracoesPerfil();">
                <div class="campo-form">
                    <label for="perfilEmail">E-mail cadastrado</label>
                    <input id="perfilEmail" type="email" placeholder="seu.email@dominio.com">
                </div>

                <div class="campo-form">
                    <label for="perfilSenha">Senha</label>
                    <input id="perfilSenha" type="password" placeholder="Digite sua senha">
                </div>

                <div class="campo-form">
                    <label for="perfilTelefone">Telefone</label>
                    <input id="perfilTelefone" type="tel" placeholder="(99) 99999-9999">
                </div>

                <div class="campo-form">
                    <label for="perfilFoto">Foto de perfil</label>
                    <input id="perfilFoto" type="file" accept="image/*" onchange="atualizarPreviewFoto(event)">
                </div>

                <div class="campo-form" id="blocoCNH">
                    <label for="perfilCNH">Categoria de CNH</label>
                    <select id="perfilCNH">
                        <option value="">Selecione a categoria</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                        <option value="AB">AB</option>
                        <option value="AC">AC</option>
                        <option value="AD">AD</option>
                        <option value="AE">AE</option>
                    </select>
                </div>

                <div class="botoes-actions">
                    <button type="submit" class="btn-aceitar">Salvar alterações</button>
                    <button type="button" class="btn-voltar"
                        onclick="window.location.href='telainicial.html'">Voltar</button>
                </div>
            </form>
        </section>
    </main>

    <div id="sidebar-container"></div>

    <div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
    <div id="toast-aviso1" class="toast-hidden1">Preencha todos os campos!</div>

    <script src="js/basic.js"></script>
    <script src="js/componentes.js"></script>
    <script src="js/tecnicos.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
    <script>
        injetarLayout("Configurações");
    </script>
</body>

</html>
