<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Técnicos</title>
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/tecnicos.css">
</head>

<body class="pagina-tecnicos">

<div id="topbar-container"></div>

<main class="tecnicos-container">
    <section class="painel-tecnicos">
        <div class="painel-tecnicos-topo">
            <div>
                <h1>Perfis de técnicos</h1>
            </div>
            <div class="tecnicos-actions">
                <button type="button" class="btn-acao-filtrar" onclick="aplicarFiltroTecnicos()">Buscar</button>
                <button type="button" class="btn-limpar-filtro" onclick="limparFiltroTecnicos()">Limpar</button>
                <button type="button" class="btn-exportar" onclick="exportarTecnicosCSV()">Exportar</button>
            </div>
        </div>

        <section class="tecnicos-filtro-panel">
            <div class="filtro-busca">
                <input id="filtroBuscaTecnico" type="text" class="filtro-busca-input"
                       placeholder="Digite nome ou matrícula ou e-mail">
            </div>
        </section>

        <div class="tecnicos-table-wrapper">
            <table class="tecnicos-table">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Matrícula</th>
                    <th>E-mail</th>
                    <th>Setor</th>
                    <th>Perfil</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="tecnicosTabelaCorpo"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="popupEditarTecnico" class="sobreposicao popup-editar-tecnico">
    <div class="popup-card">
        <button class="popup-close" onclick="fecharPopupEditarTecnico()">×</button>
        <h2 class="popup-titulo">Editar técnico</h2>
        <div class="popup-conteudo">
            <div class="group">
                <input id="editarNome" type="text" class="input" placeholder=" " required>
                <span class="bar"></span>
                <label>Nome</label>
            </div>
            <div class="group">
                <input id="editarEmail" type="email" class="input" placeholder=" " required>
                <span class="bar"></span>
                <label>E-mail</label>
            </div>
            <div class="group">
                <input id="editarMatricula" type="text" class="input" placeholder=" " required>
                <span class="bar"></span>
                <label>Matrícula</label>
            </div>
            <div class="group">
                <input id="editarTelefone" type="text" class="input" placeholder=" ">
                <span class="bar"></span>
                <label>Telefone</label>
            </div>
            <div class="group">
                <input id="editarSetor" type="text" class="input" placeholder=" ">
                <span class="bar"></span>
                <label>Setor</label>
            </div>
            <div class="group">
                <input id="editarPerfil" type="text" class="input" placeholder=" ">
                <span class="bar"></span>
                <label>Perfil</label>
            </div>
            <div class="group select-group">
                <label>Status</label>
                <select id="editarStatus">
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                    <option value="Suspenso">Suspenso</option>
                </select>
            </div>
        </div>
        <div class="popup-actions">
            <button type="button" class="btn-acao-filtrar" onclick="salvarAlteracoesTecnico()">Salvar
                alterações</button>
            <button type="button" class="btn-limpar-filtro" onclick="fecharPopupEditarTecnico()">Cancelar</button>
        </div>
    </div>
</div>

<div id="sidebar-container"></div>

<div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
<div id="toast-aviso1" class="toast-hidden1">Preencha todos os campos!</div>

<script src="js/basic.js"></script>
<script src="js/componentes.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/tecnicos.js"></script>
<script>
    injetarLayout("Técnicos");
</script>
</body>

</html>
