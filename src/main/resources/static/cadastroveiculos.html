<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Veículos</title>
    <link rel="stylesheet" href="css/componentes.css" />
    <link rel="stylesheet" href="css/cadveiculos.css" />
  </head>

  <body class="pagina-chamados">
    <div id="topbar-container"></div>

    <div id="sidebar-container"></div>

    <div class="chamado-card">
      <h2 class="chamado-titulo">CADASTRO DE VEÍCULOS:</h2>

      <div class="grupo-centralizado" style="width: 100%; display: flex; justify-content: center; margin-top: 25px; margin-bottom: 15px;">
        <div class="group" style="width: 100%; max-width: 400px;">
          <select id="cad-tipo-selecionado" class="input" style="width: 100%; max-width: 100%;" onchange="aoMudarTipoVeiculo()">
            <option value="">Novo Tipo (Preencher manualmente)</option>
          </select>
          <label>Selecionar Categoria do Carro:</label>
        </div>
      </div>

      <div class="chamado-conteudo">
        <div class="coluna">
          <div class="group">
            <input id="cad-marca" required type="text" class="input" />
            <label>Marca:</label>
          </div>
          <div class="group">
            <input id="cad-modelo" required type="text" class="input" />
            <label>Modelo:</label>
          </div>
          <div class="group">
            <input id="cad-ano" required type="number" class="input" />
            <label>Ano:</label>
          </div>
          <div class="group">
            <select id="cad-categoria" required class="input">
              <option value="passenger">Passeio</option>
              <option value="utility">Utilitário</option>
            </select>
            <label>Categoria:</label>
          </div>
          <div class="group">
            <input id="cad-cor" required type="text" class="input" />
            <label>Cor:</label>
          </div>
        </div>

        <div class="coluna">
          <div class="group">
            <input id="cad-placa" required type="text" class="input" />
            <label>Placa:</label>
          </div>
          <div class="group">
            <input id="cad-prefixo" required type="text" class="input" />
            <label>Prefixo:</label>
          </div>
          <div class="group">
            <select
              required
              class="input"
              value=""
              onchange="this.setAttribute('value', this.value)"
            >
              <option value=""></option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
              <option value="E">E</option>
            </select>
            <label>CNH Necessária:</label>
          </div>
          <div class="group">
            <input required type="number" class="input" min="0" />
            <label>KM's Rodados:</label>
          </div>
          <div class="group">
            <input required type="number" class="input" min="0" />
            <label>Próxima troca de óleo (KM):</label>
          </div>
        </div>
      </div>

      <button class="btn-aceitar" id="btncadastrar">Cadastrar</button>
    </div>

    <div id="popupConfirmacao" class="popup" style="display: none">
      <div class="popup-content">
        <h2>Confirmar?</h2>
        <p>Você deseja realmente salvar as informações de cadastro?</p>
        <div class="popup-buttons">
          <button id="btn-cancelar-confirmacao" class="btn-voltar">
            Voltar
          </button>
          <button id="btn-confirmar-final" class="btn-aceitar">
            Confirmar
          </button>
        </div>
      </div>
    </div>

    <div id="popupSucesso" class="popup" style="display: none">
      <div class="popup-content">
        <h2>Sucesso!</h2>
        <p>Veículo cadastrado com sucesso.</p>
        <div class="popup-buttons">
          <button id="btn-fechar-sucesso" class="btn-aceitar">OK</button>
        </div>
      </div>
    </div>

    <div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
    <div id="toast-aviso1" class="toast-hidden1">Preencha todos os campos!</div>
    <script src="js/basic.js"></script>
    <script src="js/componentes.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/vehicle.js"></script>

    <script>
        injetarLayout("Cadastro de Veículos");
    </script>
  </body>
</html>
