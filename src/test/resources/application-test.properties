spring.application.name=SIVA-TEST

# Configuracao do H2 (Modo de Compatibilidade com MySQL) para os testes
spring.datasource.url=jdbc:h2:mem:ipem_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=YEAR
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Configuracoes do Flyway e JPA
spring.flyway.enabled=true
spring.flyway.target=2
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Seguranca (JWT)
api.security.token.secret=test_jwt_secret_key_1234567890
