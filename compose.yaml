services:
  db:
    image: mysql:8.0
    container_name: ipem_db
    restart: always
    environment:
      MYSQL_DATABASE: ipem_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: